name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push vote image
        uses: docker/build-push-action@v6
        with:
          context: ./vote
          push: true
          tags: sandeep2862/voting-app-vote:latest

      - name: Scan vote image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sandeep2862/voting-app-vote:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Build and push result image
        uses: docker/build-push-action@v6
        with:
          context: ./result
          push: true
          tags: sandeep2862/voting-app-result:latest

      - name: Scan result image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sandeep2862/voting-app-result:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: sandeep2862/voting-app-worker:latest

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sandeep2862/voting-app-worker:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

